<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Tiers</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">

<div class="logo">
⭐ Star Tiers
</div>

<input
type="text"
id="search"
class="search"
placeholder="Search player..."

>

</nav>

<div class="container">

<div class="tabs">

<button class="tab active" onclick="switchMode('Overall')">
🏆 Overall
</button>

<button class="tab" onclick="switchMode('LTMs')">
⚔️ LTMs
</button>

<button class="tab" onclick="switchMode('Vanilla')">
🌍 Vanilla
</button>

<button class="tab" onclick="switchMode('UHC')">
❤️ UHC
</button>

<button class="tab" onclick="switchMode('Pot')">
🧪 Pot
</button>

<button class="tab" onclick="switchMode('NethOP')">
🔥 NethOP
</button>

<button class="tab" onclick="switchMode('SMP')">
<img src="https://i.imgur.com/GwfaOs6.png" class="tab-icon">
SMP
</button>

<button class="tab" onclick="switchMode('DSMP')">
💎 DSMP
</button>

<button class="tab" onclick="switchMode('Sword')">
<img src="https://i.imgur.com/DwCUkDC.png" class="tab-icon">
Sword
</button>

<button class="tab" onclick="switchMode('Axe')">
🪓 Axe
</button>

<button class="tab" onclick="switchMode('Mace')">
🔨 Mace
</button>

</div>

<h1 class="title">
Top 100 Players
</h1>

<div id="leaderboard">

</div>

</div>

<script src="script.js"></script>

</body>
</html>
